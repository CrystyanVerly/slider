<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/styles.css">
  <title>Slider</title>
</head>

<body>
  <section>
    <div id="slider-wrapper" data-slider="wrapper">
      <ul id="slider-track" data-slider="rail">
        <li><img src="./assets/img/deer.webp" alt="deer" width="1920" height="1282"></li>
        <li><img src="./assets/img/duck.webp" alt="duck" width="1920" height="1280"></li>
        <li><img src="./assets/img/flamingo.webp" alt="flamingo" width="1920" height="1280"></li>
        <li><img src="./assets/img/human.webp" alt="human" width="1920" height="1280"></li>
        <li><img src="./assets/img/lion.webp" alt="lion" width="1920" height="1280"></li>
        <li><img src="./assets/img/macaw.webp" alt="macaw" width="1920" height="1280"></li>
        <li><img src="./assets/img/rabbit.webp" alt="rabbit" width="1920" height="1280"></li>
        <li><img src="./assets/img/squirrel.webp" alt="squirrel" width="1920" height="1280"></li>
      </ul>
      <div id="arrow-wrapper">
        <button class="arrow-left" data-control="prev" aria-label="previous item">
          <svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" viewBox="0 0 256 256">
            <path fill="currentColor" d="M162.83 205.17a4 4 0 0 1-5.66 5.66l-80-80a4 4 0 0 1 0-5.66l80-80a4 4 0 1 1 5.66 5.66L85.66 128Z" />
          </svg>
        </button>
        <button class="arrow-right" data-control="next" aria-label="next item">
          <svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" viewBox="0 0 256 256">
            <path fill="currentColor" d="m178.83 130.83l-80 80a4 4 0 0 1-5.66-5.66L170.34 128L93.17 50.83a4 4 0 0 1 5.66-5.66l80 80a4 4 0 0 1 0 5.66" />
          </svg>
        </button>
      </div>
    </div>
  </section>
  <script type="module" src="./scripts/script.js"></script>
</body>

</html>
